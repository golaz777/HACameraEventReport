name: "Camera Event Report"
version: "1.0.2"
slug: "camera_event_report"
description: "Monitor cameras for motion when away, with screenshot reports"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
hassio_api: true
homeassistant_api: true
media_folder: true
ingress: true
ingress_port: 8099
panel_icon: mdi:file-document-multiple
panel_title: "Camera Reports"
options:
  cameras: []
  report:
    email:
      enabled: false
      smtp_host: ""
      smtp_port: 587
      smtp_user: ""
      smtp_password: ""
      recipient: ""
      sender: ""
  notification:
    ha_persistent: true
  event_cooldown_seconds: 30
  media_path: "/data/camera_events"
  retention_days: 30
  monitoring:
    toggle_entity: ""
schema:
  cameras:
    - entity_id: str
      motion_entity: str
      name: str?
  report:
    email:
      enabled: bool
      smtp_host: str
      smtp_port: int
      smtp_user: str
      smtp_password: password
      recipient: str
      sender: str
  notification:
    ha_persistent: bool
  event_cooldown_seconds: int
  media_path: str
  retention_days: int?
  monitoring:
    toggle_entity: str
